<style>
/* ============================================================
   Palette : encre notariale / papier / cire à cacheter
   ============================================================ */
:root{
  --paper:#FBFAF7; --paper-2:#F2F0EA; --card:#FFFFFF;
  --ink:#16202B; --ink-2:#3D4A57; --ink-3:#6B7783;
  --line:#DCD8CF; --line-2:#EAE7E0;
  --seal:#8C2F39;        /* accent : cire à cacheter */
  --sage:#3F6E4E;        /* favorable */
  --amber:#9A6B12;       /* à arbitrer */
  --rouge:#A33A2E;       /* coûteux / risque */
  --gris:#5F6B76;        /* à vérifier */
  --sage-bg:#EDF3EE; --amber-bg:#FBF3E2; --rouge-bg:#FAEDEA; --gris-bg:#F0F1F2; --seal-bg:#F7ECEC;
  --r:10px; --w:1160px;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --disp:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --body:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#12181E; --paper-2:#0D1216; --card:#1A222A;
    --ink:#E8E6E1; --ink-2:#B9BFC6; --ink-3:#8B949D;
    --line:#2C3742; --line-2:#232C35;
    --seal:#D98A90; --sage:#7FB98F; --amber:#DCAE5A; --rouge:#E08E80; --gris:#9AA5B0;
    --sage-bg:#18291F; --amber-bg:#2A2416; --rouge-bg:#2B1B18; --gris-bg:#1E242A; --seal-bg:#2A1D1F;
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:16px; line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,h4{font-family:var(--disp); font-weight:600; letter-spacing:-.01em; margin:0}
h1{font-size:1.35rem; line-height:1.2}
h2{font-size:1.25rem; margin:0 0 .2rem}
h3{font-size:1.02rem; margin:0 0 .35rem}
h4{font-size:.92rem; margin:0 0 .3rem}
p{margin:.4rem 0}
a{color:var(--seal)}
.num,.money,td.n,th.n{font-family:var(--mono); font-variant-numeric:tabular-nums}

/* ---------- Bandeau ---------- */
.banner{
  background:var(--seal-bg); border-bottom:1px solid var(--line);
  color:var(--ink); padding:.55rem 1rem; font-size:.78rem; line-height:1.35;
  position:relative;
}
.banner b{color:var(--seal)}
header.top{
  padding:.9rem 1rem .7rem; border-bottom:1px solid var(--line); background:var(--paper);
}
header.top .wrap{max-width:var(--w); margin:0 auto; display:flex; gap:.35rem .9rem; align-items:baseline; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:.55rem; min-width:0}
.brand svg{width:32px; height:32px; color:var(--seal); flex:0 0 auto}
@media(max-width:420px){ .brand svg{width:27px; height:27px} }
header.top .sub{font-size:.78rem; color:var(--ink-3)}

/* ---------- Onglets ---------- */
nav.tabs{
  position:sticky; top:0; z-index:30; background:var(--paper);
  border-bottom:1px solid var(--line); overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs ol{
  display:flex; gap:0; list-style:none; margin:0 auto; padding:0 .4rem; max-width:var(--w);
}
nav.tabs button{
  appearance:none; background:none; border:none; border-bottom:2px solid transparent;
  color:var(--ink-3); font:inherit; font-size:.83rem; padding:.7rem .7rem .55rem;
  white-space:nowrap; cursor:pointer;
}
nav.tabs button .idx{font-family:var(--mono); font-size:.7rem; opacity:.6; margin-right:.3rem}
nav.tabs button[aria-selected="true"]{color:var(--seal); border-bottom-color:var(--seal); font-weight:600}
nav.tabs button:focus-visible{outline:2px solid var(--seal); outline-offset:-2px}

main{max-width:var(--w); margin:0 auto; padding:1rem .8rem 4rem}
section[role=tabpanel][hidden]{display:none}

/* ---------- Cartes ---------- */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  padding:.85rem .9rem; margin:0 0 .8rem;
}
.card>h3:first-child{margin-top:0}
.card .hint{font-size:.78rem; color:var(--ink-3); margin:.25rem 0 0}
.grid{display:grid; gap:.8rem}
@media(min-width:760px){ .grid.c2{grid-template-columns:1fr 1fr} .grid.c3{grid-template-columns:repeat(3,1fr)} .grid.c4{grid-template-columns:repeat(4,1fr)} }
.tone-v{border-left:3px solid var(--sage); background:var(--sage-bg)}
.tone-o{border-left:3px solid var(--amber); background:var(--amber-bg)}
.tone-r{border-left:3px solid var(--rouge); background:var(--rouge-bg)}
.tone-g{border-left:3px solid var(--gris); background:var(--gris-bg)}

/* ---------- Contrôles ---------- */
.ctl{margin:0 0 .75rem}
.ctl:last-child{margin-bottom:0}
.ctl>label,.lbl{display:flex; align-items:center; gap:.3rem; font-size:.82rem; color:var(--ink-2); margin:0 0 .3rem; font-weight:500}
.ctl .row{display:flex; align-items:center; gap:.6rem}
input[type=range]{flex:1; min-width:0; accent-color:var(--seal); height:26px}
input[type=number],input[type=text],input[type=date],select{
  font:inherit; font-family:var(--mono); font-size:.87rem; color:var(--ink);
  background:var(--paper); border:1px solid var(--line); border-radius:6px;
  padding:.38rem .45rem; width:100%; min-width:0;
}
select{font-family:var(--body)}
input[type=number]{width:8.5rem; flex:0 0 auto; text-align:right}
input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--seal); outline-offset:1px}
.chk{display:flex; align-items:flex-start; gap:.5rem; font-size:.85rem; margin:.4rem 0; color:var(--ink-2)}
.chk input{margin-top:.2rem; accent-color:var(--seal); width:1.05rem; height:1.05rem; flex:0 0 auto}
.field{display:flex; flex-direction:column; gap:.25rem}
.field>span{font-size:.78rem; color:var(--ink-3)}

button.btn{
  appearance:none; font:inherit; font-size:.8rem; cursor:pointer;
  background:var(--card); color:var(--ink); border:1px solid var(--line);
  border-radius:999px; padding:.42rem .8rem;
}
button.btn:hover{border-color:var(--seal); color:var(--seal)}
button.btn.primary{background:var(--seal); border-color:var(--seal); color:#fff}
@media(prefers-color-scheme:dark){ button.btn.primary{color:#12181E} }
.btns{display:flex; flex-wrap:wrap; gap:.4rem}

/* ---------- Bulles “?” ---------- */
.q{
  appearance:none; border:1px solid var(--line); background:var(--paper-2); color:var(--ink-3);
  width:17px; height:17px; border-radius:50%; font-size:11px; line-height:1; cursor:pointer;
  font-family:var(--mono); flex:0 0 auto; padding:0;
}
.q:hover{border-color:var(--seal); color:var(--seal)}
#pop{
  position:fixed; z-index:100; max-width:min(340px,calc(100vw - 24px));
  background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  box-shadow:0 10px 34px rgba(0,0,0,.18); padding:.7rem .8rem; font-size:.82rem; line-height:1.45;
}
#pop[hidden]{display:none}
#pop h4{margin:0 0 .25rem}
#pop .close{position:absolute; top:.3rem; right:.4rem; border:none; background:none; color:var(--ink-3); cursor:pointer; font-size:1rem}
.lvl{display:inline-block; font-size:.66rem; text-transform:uppercase; letter-spacing:.06em;
  padding:.1rem .4rem; border-radius:4px; font-weight:700; margin-bottom:.35rem}
.lvl.ok{background:var(--sage-bg); color:var(--sage)}
.lvl.chk{background:var(--gris-bg); color:var(--gris)}
.lvl.risk{background:var(--rouge-bg); color:var(--rouge)}

/* ---------- Chiffres ---------- */
.kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.5rem}
.kpi{border:1px solid var(--line); border-radius:8px; padding:.5rem .6rem; background:var(--card)}
.kpi .k{font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); display:block; line-height:1.25}
.kpi .v{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:1.15rem; font-weight:600; display:block; margin-top:.15rem}
.kpi.big .v{font-size:1.5rem}

/* ---------- Tables ---------- */
.tw{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:.5rem -.9rem -.85rem; padding:0 .9rem .85rem}
table{border-collapse:collapse; width:100%; font-size:.8rem; min-width:520px}
th,td{padding:.42rem .5rem; text-align:left; border-bottom:1px solid var(--line-2); vertical-align:top}
thead th{font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-3); font-weight:600; border-bottom:1px solid var(--line)}
td.n,th.n{text-align:right; font-family:var(--mono); font-variant-numeric:tabular-nums; white-space:nowrap}
tbody tr:hover{background:var(--paper-2)}
table.sticky th:first-child,table.sticky td:first-child{position:sticky; left:0; background:var(--card)}
tbody tr:hover td:first-child{background:var(--paper-2)}

/* ---------- Signature : barre des quotités ---------- */
.quot{margin:.5rem 0 .3rem}
.quot .bar{display:flex; height:30px; border:1px solid var(--line); border-radius:6px; overflow:hidden}
.quot .seg{position:relative; font-size:.62rem; font-family:var(--mono); color:#fff; display:flex;
  align-items:center; justify-content:center; overflow:hidden; white-space:nowrap}
.seg.pp-mere{background:var(--seal)}
.seg.usu{
  background:repeating-linear-gradient(45deg,var(--gris) 0 5px,transparent 5px 10px), var(--sage);
  color:#fff;
}
.seg.np{background:var(--sage); opacity:.55; color:#fff; border-left:1px solid rgba(255,255,255,.45)}
.seg.ppenf{background:var(--sage); color:#fff; border-left:1px solid rgba(255,255,255,.45)}
@media(prefers-color-scheme:dark){ .seg{color:#0D1216} }
.legend{display:flex; flex-wrap:wrap; gap:.7rem; font-size:.7rem; color:var(--ink-3); margin-top:.35rem}
.legend i{display:inline-block; width:11px; height:11px; border-radius:2px; margin-right:.25rem; vertical-align:-1px}
.legend .l1{background:var(--seal)} .legend .l2{background:repeating-linear-gradient(45deg,var(--gris) 0 4px,transparent 4px 8px),var(--sage)}
.legend .l3{background:var(--sage); opacity:.55} .legend .l4{background:var(--sage)}

/* ---------- Graphiques ---------- */
.chart{width:100%; height:auto; display:block; overflow:visible}
.chart .axis{stroke:var(--line); stroke-width:1}
.chart .glab{font-size:9px; fill:var(--ink-3); font-family:var(--mono)}
.chart .gval{font-size:9px; fill:var(--ink-2); font-family:var(--mono)}

/* ---------- Divers ---------- */
.badge{display:inline-block; font-size:.68rem; padding:.1rem .4rem; border-radius:4px; font-weight:700; letter-spacing:.03em}
.b-v{background:var(--sage-bg); color:var(--sage)} .b-o{background:var(--amber-bg); color:var(--amber)}
.b-r{background:var(--rouge-bg); color:var(--rouge)} .b-g{background:var(--gris-bg); color:var(--gris)}
.sep{border:none; border-top:1px solid var(--line-2); margin:.8rem 0}
details{border:1px solid var(--line); border-radius:8px; padding:.5rem .65rem; margin:.5rem 0; background:var(--card)}
details>summary{cursor:pointer; font-size:.84rem; font-weight:600; color:var(--ink-2)}
details[open]>summary{margin-bottom:.5rem}
.calc{font-family:var(--mono); font-size:.74rem; line-height:1.6; white-space:pre-wrap; color:var(--ink-2)}
.mini{font-size:.75rem; color:var(--ink-3)}
.frac{font-family:var(--mono); font-size:.9em}
ul.tight{margin:.3rem 0; padding-left:1.1rem} ul.tight li{margin:.15rem 0; font-size:.85rem}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:1.2rem; z-index:200;
  background:var(--ink); color:var(--paper); padding:.5rem .9rem; border-radius:999px; font-size:.8rem}
.toast[hidden]{display:none}
.scnhead{display:flex; align-items:baseline; gap:.5rem; flex-wrap:wrap}
.scnhead .tag{font-family:var(--mono); font-size:.75rem; color:var(--seal); font-weight:700}
.warn{font-size:.78rem; color:var(--rouge); margin:.35rem 0 0}
#errors:empty{display:none}

@media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
@media print{
  nav.tabs,.btns,#pop,.toast{display:none!important}
  section[role=tabpanel][hidden]{display:block!important}
  body{background:#fff; color:#000; font-size:11px}
  .card{break-inside:avoid; border:1px solid #ccc}
  table{min-width:0}
  .tw{overflow:visible}
}
</style>
</head>

<div class="banner">

<script>
"use strict";
/* ============================================================================
   1. CONSTANTES ET ÉTAT
   ========================================================================== */

const HEIRS = [
  {id:'f1', name:'Fils 1', son:true},
  {id:'f2', name:'Fils 2', son:true},
  {id:'f3', name:'Fils 3', son:true},
  {id:'fille', name:'Fille (1er mariage)', son:false}
];
const BENEFS = [{id:'mere',name:'Mère'},{id:'f1',name:'Fils 1'},{id:'f2',name:'Fils 2'},
                {id:'f3',name:'Fils 3'},{id:'fille',name:'Fille'}];

/* Configuration générique des 4 options. Les 4 fonctions nommées demandées
   (calcScenarioUsufruit100, etc.) sont des enveloppes de computeScenario(). */
const SCEN = [
  {id:'A', tag:'A', short:'100 % US',        label:'100 % usufruit',
   ppShare:0,    usufOnRest:1, ddv:true,  renonce:false},
  {id:'B', tag:'B', short:'1/4 PP + 3/4 US', label:'1/4 pleine propriété + 3/4 usufruit',
   ppShare:0.25, usufOnRest:1, ddv:true,  renonce:false},
  {id:'C', tag:'C', short:'1/4 PP',          label:'1/4 pleine propriété seulement',
   ppShare:0.25, usufOnRest:0, ddv:false, renonce:false}
];

const USU_TABLE = [
  {max:20, u:90}, {max:30, u:80}, {max:40, u:70}, {max:50, u:60}, {max:60, u:50},
  {max:70, u:40}, {max:80, u:30}, {max:90, u:20}, {max:999, u:10}
];

function defaults(){
  const assets = [
    {id:'cb_pere', nom:'Comptes bancaires du père',        montant:0, prop:'pere', regime:'succ'},
    {id:'cb_mere', nom:'Comptes bancaires de la mère',     montant:0, prop:'mere', regime:'succ'},
    {id:'ct_pere', nom:'Compte-titres du père',            montant:0, prop:'pere', regime:'succ'},
    {id:'ct_mere', nom:'Compte-titres de la mère',         montant:0, prop:'mere', regime:'succ'},
    {id:'pea',     nom:'PEA',                              montant:0, gains:0, prop:'commun', regime:'pea'},
    {id:'autres',  nom:'Autres actifs',                    montant:0, prop:'commun', regime:'succ'},
    {id:'dettes',  nom:'Dettes (passif)',                  montant:0, prop:'commun', regime:'passif'},
    {id:'obseq',   nom:'Frais funéraires',                 montant:0, prop:'pere',   regime:'obseques'},
    {id:'pea2',    nom:'PEA — gains latents',              montant:0, gains:0, prop:'commun', regime:'pea'}
  ];
  const avSplit = () => ({mere:100, f1:0, f2:0, f3:0, fille:0});
  return {
    /* --- patrimoine immobilier --- */
    maisonValeur:0, partPere:50, partMere:50,
    /* --- famille --- */
    naissanceMere:'1960-01-01', decesPere:'2026-01-01',
    ageAuto:true, usufruitRate:40,
    nbFils:3, nbEnfantsPere:4,
    /* --- fiscalité --- */
    abattement:100000,
    donationsActives:true, donationAnnee:2015,
    don:{ f1:{pere:0,mere:0}, f2:{pere:0,mere:0}, f3:{pere:0,mere:0}, fille:{pere:0,mere:0} },
    bareme:[[8072,5],[12109,10],[15932,15],[552324,20],[902838,30],[1805677,40],[Infinity,45]],
    ddvPresente:true,
    /* --- actifs financiers --- */
    assets,
    av:{
      pereAvant70:{primes:0, split:avSplit()},
      pereApres70:{primes:0, gains:0, split:avSplit()},
      mereAvant70:{primes:0, split:{mere:0,f1:33.34,f2:33.33,f3:33.33,fille:0}},
      mereApres70:{primes:0, gains:0, split:{mere:0,f1:33.34,f2:33.33,f3:33.33,fille:0}},
      abatAvant70:152500, taux1:20, seuil1:700000, taux2:31.25,
      abatApres70:30500, conjointExonere:true, taxerGains70plus:false
    },
    tauxNonParent:60, tauxPS:17.2, plafondObseques:1500,
    /* --- rachat --- */
    rachatActif:true,
    prix:{A:0, B:0, C:0},
    fraisRachat:2.5,
    /* --- horizon / vente --- */
    anneesDecesMere:20, croissance:0, consoMere:0,
    venteQuand:'apres_mere', anneesVente:20,
    pvTaux:36.2, pvAbattement:true, pvExoResidence:false
  };
}

/** Jeu de démonstration : chiffres ronds et fictifs, aucune donnée réelle. */
function exemple(){
  const d = defaults();
  d.maisonValeur = 1000000;
  d.don.f1.mere = 50000; d.donationAnnee = 2015;
  d.assets.find(a=>a.id==='cb_pere').montant = 60000;
  d.assets.find(a=>a.id==='cb_mere').montant = 30000;
  d.av.pereAvant70.primes = 100000;
  d.av.pereAvant70.split = {mere:100,f1:0,f2:0,f3:0,fille:0};
  d.prix = {A:75000, B:56250, C:93750};
  d.croissance = 2; d.anneesVente = 20;
  return d;
}

/* ---------------------------------------------------------------------------
   Sauvegarde locale. Les valeurs restent dans le navigateur de la personne,
   sur son appareil. Rien n'est transmis, rien n'est écrit dans le dépôt.
   Si le navigateur la refuse (navigation privée, aperçu intégré), on bascule
   sur une mémoire volatile et l'interface le signale.
   --------------------------------------------------------------------------- */
const CLE = 'succ.v2';
const STORE = (function(){
  let dispo = false, mem = null;
  try{ localStorage.setItem(CLE+'.t','1'); localStorage.removeItem(CLE+'.t'); dispo = true; }
  catch(e){ dispo = false; }
  return {
    get dispo(){ return dispo; },
    lire(){  try{ return dispo ? localStorage.getItem(CLE) : mem; }catch(e){ return mem; } },
    ecrire(v){ try{ if(dispo) localStorage.setItem(CLE, v); else mem = v; }catch(e){ mem = v; } }
  };
})();

let saveTimer = null;

/** Écrit l'état courant. Appelé automatiquement après chaque modification. */
function sauvegarder(){
  try{
    const copie = JSON.parse(JSON.stringify(S));
    copie.bareme = copie.bareme.map(b=>[isFinite(b[0])?b[0]:null, b[1]]);
    STORE.ecrire(JSON.stringify(copie));
  }catch(e){/* sans effet : la simulation continue */}
}
function planifierSauvegarde(){ clearTimeout(saveTimer); saveTimer = setTimeout(sauvegarder, 700); }

/** Relit la sauvegarde au démarrage. La clé porte un numéro de version :
 *  une mise à jour du simulateur qui changerait la structure repart proprement. */
function charger(){
  const brut = STORE.lire();
  if(!brut) return false;
  try{
    const d = JSON.parse(brut);
    S = Object.assign(defaults(), d);
    S.bareme = (d.bareme||defaults().bareme).map(b=>[b[0]===null?Infinity:b[0], b[1]]);
    return true;
  }catch(e){ return false; }
}

let S = defaults();
let R = null;               // résultats calculés
let ACTIVE = 'p-hyp';

/* ============================================================================
   2. HELPERS
   ========================================================================== */
const NF  = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const NF2 = new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2});
function formatEuro(v){ if(!isFinite(v)) return '—'; return NF.format(Math.round(v)); }
function pct(v,d){ return NF2.format(Number(v).toFixed(d===undefined?1:d))+' %'; }
function num(v){ const n = parseFloat(String(v).replace(/[^\d.,-]/g,'').replace(',','.')); return isFinite(n)?n:0; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function get(path){ return path.split('.').reduce((o,k)=>o==null?o:o[k], S); }
function set(path,val){
  const ks = path.split('.'); const last = ks.pop();
  const o = ks.reduce((o,k)=>o[k], S); o[last]=val;
}
function $(sel,root){ return (root||document).querySelector(sel); }
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.hidden=false;
  clearTimeout(t._t); t._t=setTimeout(()=>t.hidden=true,2200);
}

/* ============================================================================
   3. MOTEUR DE CALCUL
   ========================================================================== */

/** Âge de la mère (années révolues) au décès du père. */
function ageMere(){
  const n = new Date(S.naissanceMere), d = new Date(S.decesPere);
  if(isNaN(n)||isNaN(d)) return 67;
  let a = d.getFullYear()-n.getFullYear();
  const m = d.getMonth()-n.getMonth();
  if(m<0 || (m===0 && d.getDate()<n.getDate())) a--;
  return a;
}

/** Taux d'usufruit fiscal (art. 669 CGI). */
function calcUsufruitRate(age){
  if(age===undefined) age = ageMere();
  if(!S.ageAuto) return S.usufruitRate/100;
  for(const r of USU_TABLE) if(age<=r.max) return r.u/100;
  return 0.1;
}
function calcBareOwnershipRate(age){ return 1 - calcUsufruitRate(age); }

/** Droits de succession en ligne directe, barème progressif.
 *  @returns {{base,abattementUtilise,droits,tranches:[]}} */
function baremeTax(base){
  let reste = Math.max(0, base||0), prev = 0, droits = 0; const tranches = [];
  for(const [plafond, taux] of S.bareme){
    if(reste<=0) break;
    const largeur = plafond - prev, dedans = Math.min(reste, largeur);
    if(dedans>0){ const d = dedans*taux/100; droits += d;
      tranches.push({de:prev, a:prev+dedans, taux, assiette:dedans, droits:d}); }
    reste -= dedans; prev = plafond;
  }
  return {droits, tranches};
}

/** Droits de succession en ligne directe.
 *  Méthode différentielle : la donation rapportée consomme l'abattement ET les tranches
 *  basses (art. 784 CGI), au lieu de seulement réduire l'abattement. */
function calcInheritanceTax(montant, abattementDispo, donationsAnterieures){
  const donations = S.donationsActives ? (donationsAnterieures||0) : 0;
  const abat = abattementDispo||0;
  const abatUtil = Math.max(0, abat - donations);
  const baseTotale = Math.max(0, (montant||0) + donations - abat);
  const baseDon    = Math.max(0, donations - abat);
  const tTot = baremeTax(baseTotale), tDon = baremeTax(baseDon);
  const droits = Math.max(0, tTot.droits - tDon.droits);
  return {montant:montant||0, abattementDispo:abat, donations, abattementUtilise:abatUtil,
          base: Math.max(0,(montant||0)-abatUtil), baseTotale, baseDon,
          droits, droitsBruts:tTot.droits, droitsDonation:tDon.droits,
          tranches:tTot.tranches, rappelTranches: tDon.droits > 0};
}

/** Assurance-vie versée avant 70 ans (art. 990 I CGI). */
function calcLifeInsuranceTax(montantParBenef, isConjoint){
  const a = S.av;
  if(isConjoint && a.conjointExonere) return {taxable:0, droits:0, exonere:true};
  const taxable = Math.max(0, montantParBenef - a.abatAvant70);
  const t1 = Math.min(taxable, a.seuil1);
  const t2 = Math.max(0, taxable - a.seuil1);
  return {taxable, droits: t1*a.taux1/100 + t2*a.taux2/100, exonere:false,
          t1, t2, tr1:t1*a.taux1/100, tr2:t2*a.taux2/100};
}

/** Répartit un montant selon une clé en % (objet {benefId:pourcentage}). */
function split(montant, key){
  const out={}; for(const b of BENEFS) out[b.id] = montant * ((key[b.id]||0)/100);
  return out;
}
function sumSplit(key){ return BENEFS.reduce((s,b)=>s+(Number(key[b.id])||0),0); }

/** Actifs financiers entrant dans la succession classique. */
function massesFinancieres(){
  let finPere=0, finMere=0, passifPere=0, passifMere=0, obsPere=0, obsMere=0, psPea=0;
  for(const a of S.assets){
    const partP = a.prop==='pere' ? 1 : a.prop==='commun' ? .5 : 0;
    const partM = a.prop==='mere' ? 1 : a.prop==='commun' ? .5 : 0;
    if(a.regime==='passif'){ passifPere += a.montant*partP; passifMere += a.montant*partM; }
    else if(a.regime==='obseques'){ obsPere += a.montant*partP; obsMere += a.montant*partM; }
    else if(a.regime==='pea'){
      // PEA : clôturé au décès. Gains exonérés d'impôt sur le revenu mais soumis
      // aux prélèvements sociaux, qui viennent en passif de la succession.
      const ps = (a.gains||0)*S.tauxPS/100;
      psPea += ps;
      finPere += a.montant*partP; finMere += a.montant*partM;
      passifPere += ps*partP; passifMere += ps*partM;
    }
    else if(a.regime==='succ'){ finPere += a.montant*partP; finMere += a.montant*partM; }
  }
  // Les frais funéraires ne sont déductibles que dans la limite du forfait légal.
  passifPere += Math.min(obsPere, S.plafondObseques);
  passifMere += Math.min(obsMere, S.plafondObseques);
  return {finPere, finMere, passifPere, passifMere, obsPere, obsMere, psPea};
}

/** Assurance-vie du père : part taxable par bénéficiaire. */
function avPere(){
  const a=S.av;
  const av70m = split(a.pereAvant70.primes, a.pereAvant70.split);
  const primes70p = split(a.pereApres70.primes, a.pereApres70.split);
  const gains70p  = split(a.pereApres70.gains,  a.pereApres70.split);
  // L'abattement global de 30 500 € se répartit entre les seuls bénéficiaires
  // effectivement soumis aux droits : le conjoint exonéré n'en consomme aucune part.
  const primesTaxables = BENEFS.reduce((s,b)=>
    s + ((b.id==='mere' && a.conjointExonere) ? 0 : primes70p[b.id]), 0);
  const res = {};
  for(const b of BENEFS){
    const isConj = b.id==='mere';
    const av990 = calcLifeInsuranceTax(av70m[b.id], isConj);
    const quotePart = primesTaxables>0
      ? ((isConj && a.conjointExonere) ? 0 : primes70p[b.id]/primesTaxables) : 0;
    const abat70p = a.abatApres70 * quotePart;
    let reintegre = Math.max(0, primes70p[b.id] - abat70p);
    if(a.taxerGains70plus) reintegre += gains70p[b.id];
    if(isConj && a.conjointExonere) reintegre = 0;
    res[b.id] = {avant70:av70m[b.id], droits990:av990.droits, detail990:av990,
                 primes70p:primes70p[b.id], gains70p:gains70p[b.id],
                 abat70p, reintegreSuccession:reintegre};
  }
  return res;
}
/** Assurance-vie de la mère (dénouée à son décès). */
function avMere(){
  const a=S.av;
  const av70m = split(a.mereAvant70.primes, a.mereAvant70.split);
  const primes70p = split(a.mereApres70.primes, a.mereApres70.split);
  const gains70p  = split(a.mereApres70.gains,  a.mereApres70.split);
  const total = BENEFS.reduce((s,b)=>s+primes70p[b.id],0);
  const res={};
  for(const b of BENEFS){
    const av990 = calcLifeInsuranceTax(av70m[b.id], false);
    const q = total>0 ? primes70p[b.id]/total : 0;
    let reintegre = Math.max(0, primes70p[b.id] - a.abatApres70*q);
    if(a.taxerGains70plus) reintegre += gains70p[b.id];
    res[b.id]={avant70:av70m[b.id], droits990:av990.droits, detail990:av990,
               primes70p:primes70p[b.id], gains70p:gains70p[b.id],
               reintegreSuccession:reintegre};
  }
  return res;
}

/** Facteur de revalorisation de la maison à une échéance donnée. */
function growth(annees){ return Math.pow(1 + S.croissance/100, annees||0); }

/* -------------------------------------------------------------------------
   Cœur : un scénario = (quote-part en PP pour la mère, usufruit sur le reste)
   ------------------------------------------------------------------------- */
function computeScenario(sc){
  const np   = calcBareOwnershipRate();
  const usuR = calcUsufruitRate();
  const V0   = S.maisonValeur;
  const G    = growth(S.anneesDecesMere);         // maison au décès de la mère
  const V1   = V0*G;
  const maisonPere = V0*S.partPere/100;
  const maisonMere = V0*S.partMere/100;
  const {finPere, finMere, passifPere, passifMere} = massesFinancieres();
  const avP = avPere(), avM = avMere();

  const massePere = Math.max(0, maisonPere + finPere - passifPere);
  const pp   = sc.ppShare;                        // quote-part PP de la mère
  const rest = 1 - pp;                            // ce qui revient aux 4 enfants
  const enUsufruit = sc.usufOnRest ? rest : 0;    // fraction grevée d'usufruit
  const nbEnf = Math.max(1, S.nbEnfantsPere);

  /* ---- Ce que reçoit chaque enfant du père ---- */
  const partPleineEnfant  = massePere*rest/nbEnf;                  // valeur pleine future
  const partFiscaleEnfant = partPleineEnfant*(sc.usufOnRest?np:1); // assiette taxable
  // ventilation maison seule (utile au rachat)
  const maisonNetteRest = maisonPere*rest;
  const maisonPleineEnfant  = maisonNetteRest/nbEnf;
  const maisonFiscaleEnfant = maisonPleineEnfant*(sc.usufOnRest?np:1);
  const maisonPartEnfantPct = (S.partPere/100)*rest/nbEnf;          // % de la maison entière

  /* ---- Ce que reçoit la mère au décès du père ---- */
  const merePP   = massePere*pp;
  const mereUsuF = massePere*enUsufruit*usuR;      // valeur fiscale de l'usufruit (non taxée)
  // Sur les sommes d'argent, l'usufruit devient quasi-usufruit (art. 587 C. civ.) :
  // la mère peut les employer, les enfants détiennent une créance de restitution.
  // Montant indicatif — VOLONTAIREMENT NON DÉDUIT de la masse de la mère ci-dessous.
  const creanceQuasiUsufruit = Math.max(0, finPere) * enUsufruit;

  /* ---- Droits au décès du père ---- */
  const droitsPere = {}; let droitsPereFils=0, droitsPereFille=0, droitsAV=0;
  for(const h of HEIRS){
    const reintegre = avP[h.id].reintegreSuccession;
    const t = calcInheritanceTax(partFiscaleEnfant + reintegre, S.abattement, S.don[h.id].pere);
    const dav = avP[h.id].droits990;
    droitsPere[h.id] = {succ:t, droits:t.droits, av990:dav, total:t.droits+dav,
                        recuFiscal:partFiscaleEnfant, recuPlein:partPleineEnfant, reintegre};
    if(h.son) droitsPereFils += t.droits+dav; else droitsPereFille += t.droits+dav;
    droitsAV += dav;
  }

  /* ---- Succession de la mère ---- */
  const pctMaisonMere = (S.partMere/100) + pp*(S.partPere/100);
  const maisonMereFinale = V1*pctMaisonMere;
  const finMereFinal = Math.max(0, (finMere + finPere*pp) * (1 - S.consoMere/100));
  const masseMere = Math.max(0, maisonMereFinale + finMereFinal - passifMere);
  const parFils = masseMere / Math.max(1,S.nbFils);
  const droitsMere = {}; let droitsMereFils=0, droitsAVMere=0;
  for(const h of HEIRS){
    if(!h.son){
      // La fille n'est pas héritière de la mère. Si elle est bénéficiaire d'un contrat
      // alimenté après 70 ans, la fraction réintégrée est taxée au tarif entre non-parents.
      const nonParent = avM[h.id].reintegreSuccession * S.tauxNonParent/100;
      droitsMere[h.id]={droits:nonParent, base:null, av990:avM[h.id].droits990,
                        total:nonParent+avM[h.id].droits990, nonParent:true};
      droitsAVMere+=avM[h.id].droits990; continue; }
    const t = calcInheritanceTax(parFils + avM[h.id].reintegreSuccession, S.abattement, S.don[h.id].mere);
    const dav = avM[h.id].droits990;
    droitsMere[h.id]={succ:t, droits:t.droits, av990:dav, total:t.droits+dav, recu:parFils};
    droitsMereFils += t.droits+dav; droitsAVMere += dav;
  }

  /* ---- Patrimoine final des 3 fils ---- */
  // valeur pleine reçue du père, maison revalorisée à l'extinction de l'usufruit
  const partFilsPereFuture = maisonPleineEnfant*G + (finPere*rest/nbEnf);
  // Le capital d'assurance-vie est hors succession : il n'entre pas dans massePere ni
  // dans masseMere, mais il est bien perçu — et ses droits étaient déjà déduits.
  const avCapitalFils = HEIRS.filter(h=>h.son).reduce((s,h)=>
    s + avP[h.id].avant70 + avP[h.id].primes70p + avP[h.id].gains70p
      + avM[h.id].avant70 + avM[h.id].primes70p + avM[h.id].gains70p, 0);
  const avCapitalFille = avP.fille.avant70 + avP.fille.primes70p + avP.fille.gains70p
      + avM.fille.avant70 + avM.fille.primes70p + avM.fille.gains70p;
  const brutFils = S.nbFils*partFilsPereFuture + masseMere + avCapitalFils;
  const netFils  = brutFils - droitsPereFils - droitsMereFils;

  /* ---- Fille ---- */
  const filleFuture = maisonPleineEnfant*G + (finPere*rest/nbEnf) + avCapitalFille;
  const filleDroits = droitsPereFille + droitsMere.fille.total;

  /* ---- Rachat de la part de la fille ---- */
  const prixDemande = S.prix[sc.id]||0;
  const frais = prixDemande*S.fraisRachat/100;
  const coutRachat = S.rachatActif ? prixDemande+frais : 0;
  const cashAvantVente = droitsPereFils + coutRachat;
  const coutTotalFils = droitsPereFils + droitsMereFils + coutRachat;

  return {
    sc, np, usuR, V0, V1, G, maisonPere, maisonMere, massePere, finPere, finMere, passifPere,
    pp, rest, enUsufruit, merePP, mereUsuF,
    partPleineEnfant, partFiscaleEnfant,
    maisonPleineEnfant, maisonFiscaleEnfant, maisonPartEnfantPct,
    droitsPere, droitsPereFils, droitsPereFille, droitsAV,
    pctMaisonMere, maisonMereFinale, finMereFinal, masseMere, parFils,
    droitsMere, droitsMereFils, droitsAVMere,
    passifMere, avCapitalFils, avCapitalFille, creanceQuasiUsufruit,
    droitsTotaux: droitsPereFils+droitsPereFille+droitsMereFils+droitsMere.fille.total,
    droitsTotauxFils: droitsPereFils+droitsMereFils,
    brutFils, netFils, netParFils: netFils/Math.max(1,S.nbFils),
    filleFuture, filleDroits,
    prixDemande, fraisRachat:frais, coutRachat, cashAvantVente, coutTotalFils,
    prixFiscal: maisonFiscaleEnfant, prixPleinFutur: maisonPleineEnfant*G,
    prixPlein0: maisonPleineEnfant
  };
}

function calcScenarioUsufruit100(){ return computeScenario(SCEN[0]); }
function calcScenarioQuarterPPThreeQuarterUsufruit(){ return computeScenario(SCEN[1]); }
function calcScenarioQuarterPPOnly(){ return computeScenario(SCEN[2]); }

/** Vente future : ce qui est vendable, bloqué, net d'impôt. */
function calcFutureSale(r){
  const n = S.anneesVente;
  const Vv = S.maisonValeur*growth(n);
  const pctPPmere   = (S.partMere/100) + r.pp*(S.partPere/100);
  const pctNPenf    = (S.partPere/100)*r.enUsufruit;
  const pctPPenf    = (S.partPere/100)*r.rest - pctNPenf;
  let vendableSansAccordUsufruitier, bloque, contexte;
  switch(S.venteQuand){
    case 'apres_pere':
    case 'vivant_mere':
      vendableSansAccordUsufruitier = pctPPmere + pctPPenf;
      bloque = pctNPenf;
      contexte = "Du vivant de la mère : la vente de la pleine propriété exige l'accord de l'usufruitière ET de tous les nus-propriétaires (art. 815-3 et 621 C. civ.).";
      break;
    case 'apres_mere':
      vendableSansAccordUsufruitier = 1; bloque = 0;
      contexte = "Après le décès de la mère, l'usufruit est éteint : les héritiers détiennent la pleine propriété (mais restent en indivision).";
      break;
    default:
      vendableSansAccordUsufruitier = 0; bloque = pctNPenf;
      contexte = "Aucune vente : la maison reste en indivision / démembrement.";
  }
  const prixVente = Vv;
  // valeur d'acquisition fiscale : valeur retenue en succession (+ prix de rachat éventuel)
  const acqui = S.maisonValeur + (S.rachatActif ? Math.max(0, r.prixDemande - r.maisonPleineEnfant) : 0);
  const fractionVendue = (S.venteQuand==='apres_mere') ? 1 : vendableSansAccordUsufruitier;
  let pv = Math.max(0, prixVente - acqui) * fractionVendue;
  let abattement = 0;
  if(S.pvAbattement){
    const d = n;
    const abIR = d<=5?0 : d>=22?1 : (Math.min(d,21)-5)*0.06 + (d>=22?0.04:0);
    const abPS = d<=5?0 : d>=30?1 : (d<=21?(d-5)*0.0165 : d===22?0.28 : 0.28+(d-22)*0.09);
    abattement = (0.19*Math.max(0,1-abIR) + 0.172*Math.max(0,1-abPS));
  }
  const tauxEffectif = S.pvExoResidence ? 0 : (S.pvAbattement ? abattement*100 : S.pvTaux);
  const impotPV = pv*tauxEffectif/100;
  const brut = prixVente*(S.venteQuand==='apres_mere'?1:vendableSansAccordUsufruitier);
  return {n, Vv, prixVente, pctPPmere, pctNPenf, pctPPenf, vendable:vendableSansAccordUsufruitier,
          bloque, contexte, acqui, pv, tauxEffectif, impotPV, brut,
          netApresVente: brut - impotPV - r.coutRachat - r.droitsPereFils};
}

/** Recalcule tout. */
function computeAll(){
  const map = {};
  for(const s of SCEN) map[s.id] = computeScenario(s);
  for(const s of SCEN) map[s.id].vente = calcFutureSale(map[s.id]);
  // seuil A vs B
  const A=map.A, B=map.B;
  const surcoutFiscalB = B.droitsTotauxFils - A.droitsTotauxFils;
  const economieRachat = A.coutRachat - B.coutRachat;
  const delta = economieRachat - surcoutFiscalB;
  const seuil = {surcoutFiscalB, economieRachat, delta,
    verdict: Math.abs(delta) < 5000 ? 'equiv' : (delta>0 ? 'B' : 'A')};
  return {map, seuil, np:calcBareOwnershipRate(), usu:calcUsufruitRate(), age:ageMere()};
}

function tip(key){ return TIPS[key] ? `<button class="q" type="button" data-tip="${key}" aria-label="Explication">?</button>` : ''; }

function openTip(key, anchor){
  const t = TIPS[key]; if(!t) return;
  const p = $('#pop');
  const lvl = t[1]==='ok'?'<span class="lvl ok">Confirmé</span>'
            : t[1]==='risk'?'<span class="lvl risk">Risque</span>'
            : '<span class="lvl chk">À vérifier</span>';
  p.innerHTML = `<button class="close" type="button" aria-label="Fermer">×</button>${lvl}<h4>${esc(t[0])}</h4><div>${esc(t[2])}</div>`;
  p.hidden = false;
  const r = anchor.getBoundingClientRect();
  const w = p.offsetWidth, h = p.offsetHeight;
  let left = Math.min(Math.max(8, r.left - w/2 + r.width/2), innerWidth - w - 8);
  let top  = r.bottom + 8; if(top + h > innerHeight - 8) top = Math.max(8, r.top - h - 8);
  p.style.left = left+'px'; p.style.top = top+'px';
  p.querySelector('.close').onclick = ()=> p.hidden = true;
}
document.addEventListener('click', e=>{
  const q = e.target.closest('.q');
  if(q){ e.preventDefault(); openTip(q.dataset.tip, q); return; }
  if(!e.target.closest('#pop')) $('#pop').hidden = true;
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') $('#pop').hidden = true; });

function quotBar(r){
  const segs=[];
  const ppM = r.pp*100, usu = r.enUsufruit*100, ppE = (r.rest - r.enUsufruit)*100;
  if(ppM>0.5) segs.push(`<div class="seg pp-mere" style="width:${ppM}%" title="Mère, pleine propriété">${ppM>=12?'Mère PP':''}</div>`);

  return `<div class="quot"><div class="bar">${segs.join('')}</div>

/* ============================================================================
   9. GRAPHIQUES (SVG, sans dépendance)
   ========================================================================== */
function barChart(data, caption){
  const W=520, H=Math.max(90, data.length*34+26), L=118, R2=64;
  const max = Math.max(1, ...data.map(d=>Math.abs(d.value)));
  const bars = data.map((d,i)=>{
    const y = 8+i*34, w = (W-L-R2)*Math.abs(d.value)/max;
    return `<text class="glab" x="${L-6}" y="${y+16}" text-anchor="end">${esc(d.label)}</text>
      <rect x="${L}" y="${y+4}" width="${Math.max(1,w)}" height="17" rx="2" fill="var(--seal)" opacity="${.35+.6*Math.abs(d.value)/max}"></rect>
      <text class="gval" x="${L+w+6}" y="${y+17}">${formatEuro(d.value)}</text>`;
  }).join('');
  return `<figure style="margin:0"><svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(caption)}">
    <line class="axis" x1="${L}" y1="4" x2="${L}" y2="${H-6}"></line>${bars}</svg>
    <figcaption class="mini">${esc(caption)}</figcaption></figure>`;
}
function lineChart(series, caption, xlabels){
  const W=520,H=190,L=64,B=28,T=10,Rr=10;
  const all = series.flatMap(s=>s.points);
  const maxY = Math.max(1,...all), minY = Math.min(0,...all);
  const n = series[0].points.length;
  const x = i => L + (W-L-Rr)*(n<2?0:i/(n-1));
  const y = v => T + (H-T-B)*(1-(v-minY)/((maxY-minY)||1));
  const cols=['var(--seal)','var(--sage)','var(--amber)','var(--gris)'];
  const paths = series.map((s,k)=>`<path d="${s.points.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p).toFixed(1)).join(' ')}"
      fill="none" stroke="${cols[k%4]}" stroke-width="2"></path>`).join('');
  const leg = series.map((s,k)=>`<span class="mini"><i style="display:inline-block;width:14px;height:2px;background:${cols[k%4]};vertical-align:middle;margin-right:4px"></i>${esc(s.name)}</span>`).join(' ');
  const ticks = xlabels.map((l,i)=>`<text class="glab" x="${x(i)}" y="${H-8}" text-anchor="middle">${esc(l)}</text>`).join('');
  return `<figure style="margin:0"><svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(caption)}">
    <line class="axis" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"></line>
    <line class="axis" x1="${L}" y1="${H-B}" x2="${W-Rr}" y2="${H-B}"></line>
    <text class="glab" x="${L-6}" y="${y(maxY)+4}" text-anchor="end">${formatEuro(maxY)}</text>
    <text class="glab" x="${L-6}" y="${y(minY)}" text-anchor="end">${formatEuro(minY)}</text>
    ${paths}${ticks}</svg>
    <figcaption class="mini">${esc(caption)}<br>${leg}</figcaption></figure>`;
}

const QUALIF = {
  A:{prot:'Maximale — usage et revenus de tout le bien', conflit:'Faible : la fille ne peut pas provoquer le partage de la pleine propriété', force:'Peut demander la conversion de l\'usufruit en rente viagère (art. 759), sauf sur le logement principal'},
  B:{prot:'Très forte — un quart en propre plus l\'usage du reste', conflit:'Faible à modérée', force:'Même levier de conversion, sur les 3/4 grevés seulement'},
  C:{prot:'Limitée — un quart seulement, pas d\'usage garanti au-delà', conflit:'Élevée : quatre pleins propriétaires indivis', force:'Peut exiger le partage judiciaire, donc la vente (art. 815)'}

function verdicts(){
  const m=R.map, ids=SCEN.map(s=>s.id);
  const best=(fn,inv)=>ids.reduce((a,b)=> (inv? fn(m[b])>fn(m[a]) : fn(m[b])<fn(m[a])) ?b:a);
  const lab=id=>id+' · '+SCEN.find(s=>s.id===id).short;
  const prixFiscal = ids.reduce((o,id)=>{o[id]=m[id].prixFiscal;return o;},{});
  const prixPlein  = ids.reduce((o,id)=>{o[id]=m[id].prixPleinFutur;return o;},{});
  const coutSi = (prixMap)=> ids.reduce((a,b)=>{
    const c=id=>m[id].droitsTotauxFils + prixMap[id]*(1+S.fraisRachat/100);
    return c(b)<c(a)?b:a;});
  return [
    ['Payer le moins de droits', lab(best(r=>r.droitsTotaux)), 'Toutes successions confondues, tous héritiers.'],
    ['Minimiser les droits des 3 fils', lab(best(r=>r.droitsTotauxFils)), ''],
    ['Racheter la fille au plus bas', lab(best(r=>r.prixFiscal)), 'Au prix fiscal. Le prix réel se négocie.'],
    ['Protéger la mère', 'A · 100 % US, puis B', 'Usage et revenus de la totalité du bien, sans dépendre des enfants.'],
    ['Maximiser le patrimoine brut des 3 fils', lab(best(r=>r.brutFils,true)), ''],
    ['Maximiser le patrimoine net des 3 fils', lab(best(r=>r.netFils,true)), 'Après tous droits et rachat.'],
    ['Éviter la vente forcée', 'A, puis B', 'L\'usufruit neutralise le droit de provoquer le partage de la pleine propriété.'],
    ['Avantager la fille du père', lab(best(r=>r.filleFuture,true)), 'En valeur pleine reçue, sans tenir compte du délai d\'attente.'],
    ['Si la fille accepte le prix fiscal', lab(coutSi(prixFiscal)), 'Coût total pour les fils, droits + rachat au prix fiscal.'],
    ['Si la fille demande la pleine valeur future', lab(coutSi(prixPlein)), 'Coût total pour les fils, droits + rachat à la valeur pleine.'],
    ['Coût minimal aux prix actuellement saisis', lab(best(r=>r.coutTotalFils)), '']
  ];
}

function renderErrors(){
  const e=[];
  if(Math.abs(S.partPere+S.partMere-100)>0.01)
    e.push(['r','Les quote-parts de la maison totalisent '+(S.partPere+S.partMere)+' % au lieu de 100 %.']);
  if(S.maisonValeur<0 || S.abattement<0 || S.assets.some(a=>a.montant<0))
    e.push(['r','Une valeur négative a été saisie.']);
  for(const [k,t] of [['pereAvant70','père avant 70'],['pereApres70','père après 70'],['mereAvant70','mère avant 70'],['mereApres70','mère après 70']]){
    const s=sumSplit(S.av[k].split);
    if(S.av[k].primes>0 && Math.abs(s-100)>0.5) e.push(['r','Répartition des bénéficiaires ('+t+') : '+pct(s,2)+' au lieu de 100 %.']);
  }
  if(!S.ddvPresente) e.push(['o','Sans donation au dernier vivant, les options A et B ne sont pas exerçables : elles restent affichées pour comparaison seulement.']);
  if(S.donationsActives && Object.values(S.don).some(d=>d.mere>0||d.pere>0)){
    const ans = new Date(S.decesPere).getFullYear()-S.donationAnnee;
    e.push([ans<15?'o':'g','Une donation antérieure réduit l\'abattement d\'un héritier'+(ans<15?' (moins de 15 ans : rappel fiscal applicable).':' (plus de 15 ans : information conservée mais sans effet).')]);
  }
  if(S.nbEnfantsPere<S.nbFils+1) e.push(['o','Le nombre total d\'enfants du père est inférieur au nombre de fils plus la fille.']);
  if(!e.length) return '';
  return `<div class="card ${e.some(x=>x[0]==='r')?'tone-r':'tone-o'}">
    <h4>Points à corriger ou à surveiller</h4>
    <ul class="tight">${e.map(x=>`<li>${x[1]}</li>`).join('')}</ul></div>`;
}

  buildTabs();
  for(const t of TABS){
    const el = document.getElementById(t.id);
    if(t.id===ACTIVE){ el.hidden=false; el.innerHTML = t.r(); }
    else { el.hidden=true; el.innerHTML=''; }
  }
  if(ACTIVE==='p-expl') paintTests();
  planifierSauvegarde();
}

function showTab(id){
  ACTIVE = id; $('#pop').hidden = true;
  updateUI();
  window.scrollTo({top:0, behavior:'instant'});
}

/* ============================================================================
   17. LIAISONS
   ========================================================================== */
let renderTimer = null;
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(()=>{
    const a = document.activeElement;
    const key = a && a.dataset && (a.dataset.bind || a.dataset.asset!==undefined || a.dataset.bareme!==undefined)
      ? JSON.stringify([a.dataset.bind||'', a.dataset.kind||'', a.dataset.asset||'', a.dataset.f||'', a.dataset.bareme||'', a.dataset.col||''])
      : null;
    const sel = a && a.selectionStart;
    updateUI();
    if(key){
      const target = [...document.querySelectorAll('[data-bind],[data-asset],[data-bareme]')].find(n=>
        JSON.stringify([n.dataset.bind||'', n.dataset.kind||'', n.dataset.asset||'', n.dataset.f||'', n.dataset.bareme||'', n.dataset.col||''])===key);
      if(target){ target.focus({preventScroll:true});
        try{ if(sel!=null && target.setSelectionRange) target.setSelectionRange(sel,sel); }catch(_){}
      }
    }
  }, 260);
}

function applyBind(el, immediate){
  const path = el.dataset.bind, kind = el.dataset.kind;
  if(path){
    let v;
    if(kind==='check') v = el.checked;
    else if(kind==='number'||kind==='range') v = num(el.value);
    else v = el.value;
    if(path==='_venteVal'){
      const n = Math.max(1, S.anneesVente);
      const base = S.maisonValeur||1;
      S.croissance = v>0 ? (Math.pow(v/base, 1/n)-1)*100 : 0;
    } else set(path, v);
    // synchronise le jumeau curseur <-> champ
    document.querySelectorAll('[data-bind]').forEach(n=>{
      if(n!==el && n.dataset.bind===path && n.type!=='checkbox') n.value = el.value;
    });
  } else if(el.dataset.asset!==undefined){
    const a = S.assets[+el.dataset.asset], f = el.dataset.f;
    a[f] = (f==='montant') ? num(el.value) : el.value;
  } else if(el.dataset.bareme!==undefined){
    S.bareme[+el.dataset.bareme][+el.dataset.col] = num(el.value);
  } else return;
  if(immediate==='twin') return;
  if(immediate) updateUI(); else scheduleRender();
}

document.addEventListener('input', e=>{
  const el = e.target;
  if(!(el.dataset && (el.dataset.bind || el.dataset.asset!==undefined || el.dataset.bareme!==undefined))) return;
  if(el.dataset.kind==='range'){ applyBind(el, 'twin'); return; }  // rendu complet au relâchement
  applyBind(el, false);
});
document.addEventListener('change', e=>{
  const el = e.target;
  if(!(el.dataset && (el.dataset.bind || el.dataset.asset!==undefined || el.dataset.bareme!==undefined))) return;
  if(el.dataset.kind==='range' || el.dataset.kind==='check' || el.dataset.kind==='select' || el.tagName==='SELECT'){
    clearTimeout(renderTimer); applyBind(el, true);
  }
});

document.addEventListener('click', e=>{
  const tab = e.target.closest('[data-tab]');
  if(tab){ showTab(tab.dataset.tab); return; }

  const price = e.target.closest('[data-price]');
  if(price){
    const id = price.dataset.price, r = R.map[id];
    const v = price.dataset.mode==='fiscal' ? r.prixFiscal
            : price.dataset.mode==='plein'  ? r.prixPleinFutur
            : r.prixPleinFutur*0.75;
    S.prix[id] = Math.round(v); updateUI(); return;
  }

  const act = e.target.closest('[data-act]');
  if(!act) return;
  switch(act.dataset.act){
    case 'reset':     S = defaults(); sauvegarder(); updateUI();
                      toast('Valeurs à zéro, sauvegarde écrasée'); break;
    case 'demo':      S = exemple(); updateUI(); toast('Jeu d\'exemple chargé — chiffres fictifs'); break;
    case 'preset05':  S.maisonValeur = 500000;  updateUI(); break;
    case 'preset10':  S.maisonValeur = 1000000; updateUI(); break;
    case 'preset20':  S.maisonValeur = 2000000; updateUI(); break;
    case 'export':    exportJSON(); break;
    case 'import':    $('#fileimport').click(); break;
    case 'print':     window.print(); break;
    case 'copy':      copySynthese(); break;
    case 'addasset':  S.assets.push({id:'x'+Date.now(), nom:'Nouvel actif', montant:0, prop:'commun', regime:'succ'}); updateUI(); break;
  }
});

/* ============================================================================
   18. IMPORT / EXPORT / COPIE
   ========================================================================== */
function exportJSON(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'simulation-succession.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Fichier JSON exporté');
}
function importJSON(file){
  const fr = new FileReader();
  fr.onload = ()=>{
    try{
      const data = JSON.parse(fr.result);
      const base = defaults();
      S = Object.assign(base, data);
      S.bareme = (data.bareme||base.bareme).map(b=>[b[0]===null?Infinity:b[0], b[1]]);
      updateUI(); toast('Simulation importée');
    }catch(err){ toast('Fichier illisible : '+err.message); }
  };
  fr.readAsText(file);
}
$('#fileimport').addEventListener('change', e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });

function syntheseTexte(){
  const L=[];
  L.push('SIMULATION DE SUCCESSION — indicative, à valider par notaire/fiscaliste');
  L.push('');
  L.push('Maison '+formatEuro(S.maisonValeur)+' — père '+S.partPere+' % / mère '+S.partMere+' %');
  L.push('Mère '+ageMere()+' ans → usufruit '+pct(calcUsufruitRate()*100,0)+', nue-propriété '+pct(calcBareOwnershipRate()*100,0));
  L.push('Donation au dernier vivant : '+(S.ddvPresente?'oui':'non — options A et B non exerçables'));
  L.push('');
  for(const s of SCEN){
    const r = R.map[s.id];
    L.push(s.tag+' — '+s.label);
    L.push('   droits décès père : '+formatEuro(r.droitsPereFils+r.droitsPereFille)
          +' | décès mère : '+formatEuro(r.droitsMereFils)
          +' | total : '+formatEuro(r.droitsTotaux));
    L.push('   part de la fille : '+pct(r.maisonPartEnfantPct*100,2)+' — prix fiscal '+formatEuro(r.prixFiscal)
          +' — prix négocié '+formatEuro(r.prixDemande));
    L.push('   cash avant vente : '+formatEuro(r.cashAvantVente)+' | net par fils : '+formatEuro(r.netParFils));
  }
  L.push('');
  L.push('Seuil A/B : économie de rachat '+formatEuro(R.seuil.economieRachat)
        +' − surcoût fiscal '+formatEuro(R.seuil.surcoutFiscalB)+' = '+formatEuro(R.seuil.delta));
  L.push('');
  for(const [o,v] of verdicts()) L.push(o+' → '+v);
  return L.join('\n');
}
function copySynthese(){
  const txt = syntheseTexte();
  const done = ()=>toast('Synthèse copiée');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done, ()=>fallback());
  } else fallback();
  function fallback(){
    const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy'); done();}catch(_){toast('Copie impossible');}
    ta.remove();
  }
}

/* ============================================================================
   19. TESTS INTERNES
   ========================================================================== */
/* La console reste muette sauf si l'URL se termine par ?debug=1.
   Les résultats des tests sont de toute façon affichés dans l'onglet Explications. */
const DEBUG = (typeof location!=='undefined') && /[?&]debug=1/.test(location.search||'');

function runTests(){
  const saved = JSON.stringify(S);
  const out = [];
  const near = (a,b,tol)=>Math.abs(a-b) <= (tol===undefined?0.5:tol);
  function scenario(maison, id){
    S = defaults(); S.maisonValeur = maison;
    return computeScenario(SCEN.find(s=>s.id===id));
  }
  const T = [
    ['Maison 1 000 000 € — part du père (50 %)', ()=>scenario(1000000,'A').maisonPere, 500000],
    ['A — valeur pleine future par enfant', ()=>scenario(1000000,'A').partPleineEnfant, 125000],
    ['A — valeur fiscale par enfant (nue-propriété 60 %)', ()=>scenario(1000000,'A').partFiscaleEnfant, 75000],
    ['B — valeur pleine future par enfant', ()=>scenario(1000000,'B').partPleineEnfant, 93750],
    ['B — valeur fiscale par enfant', ()=>scenario(1000000,'B').partFiscaleEnfant, 56250],
    ['Maison 800 000 €, A — valeur pleine future', ()=>scenario(800000,'A').partPleineEnfant, 100000],
    ['Maison 800 000 €, A — valeur fiscale', ()=>scenario(800000,'A').partFiscaleEnfant, 60000],
    ['Maison 800 000 €, B — valeur pleine future', ()=>scenario(800000,'B').partPleineEnfant, 75000],
    ['Maison 800 000 €, B — valeur fiscale', ()=>scenario(800000,'B').partFiscaleEnfant, 45000],
    ['C — pleine propriété directe par enfant', ()=>scenario(1000000,'C').partPleineEnfant, 93750],
    ['Taux de nue-propriété à 66 ans', ()=>{S=defaults(); return calcBareOwnershipRate()*100;}, 60],
    ['Barème : 200 000 € reçus, abattement 100 000 €', ()=>{S=defaults(); return calcInheritanceTax(200000,100000,0).droits;}, 18194.35],
    ['Barème : abattement absorbe tout', ()=>{S=defaults(); return calcInheritanceTax(90000,100000,0).droits;}, 0],
    ['Donation antérieure imputée sur l\'abattement', ()=>{S=defaults(); return calcInheritanceTax(200000,100000,30000).abattementUtilise;}, 70000],
    ['AV avant 70 ans : 1 000 000 € à un enfant', ()=>{S=defaults(); return calcLifeInsuranceTax(1000000,false).droits;}, 186093.75],
    ['AV avant 70 ans : conjoint exonéré', ()=>{S=defaults(); return calcLifeInsuranceTax(1000000,true).droits;}, 0],
    ['B — succession de la mère = 62,5 % de la maison', ()=>scenario(1000000,'B').pctMaisonMere*100, 62.5],
    ['A — extinction de l\'usufruit non retaxée', ()=>scenario(1000000,'A').pctMaisonMere*100, 50],
    // --- invariants de conservation des assiettes ---
    ['Invariant A : PP mère + usufruit + assiettes enfants = masse du père',
      ()=>{const x=scenario(1000000,'A'); return x.merePP + x.mereUsuF + x.partFiscaleEnfant*4 - x.massePere;}, 0],
    ['Invariant B : idem', ()=>{const x=scenario(1000000,'B'); return x.merePP + x.mereUsuF + x.partFiscaleEnfant*4 - x.massePere;}, 0],
    ['Invariant C : idem', ()=>{const x=scenario(1000000,'C'); return x.merePP + x.mereUsuF + x.partFiscaleEnfant*4 - x.massePere;}, 0],
    ['Passif : dette de 100 000 € au père réduit sa masse',
      ()=>{S=defaults(); S.maisonValeur=1000000; S.assets.find(a=>a.id==='dettes').montant=200000;
           S.assets.find(a=>a.id==='dettes').prop='pere';
           return computeScenario(SCEN[0]).massePere;}, 300000],
    ['Passif : dette de 200 000 € à la mère réduit SA masse',
      ()=>{S=defaults(); S.maisonValeur=1000000; S.assets.find(a=>a.id==='dettes').montant=200000;
           S.assets.find(a=>a.id==='dettes').prop='mere';
           return computeScenario(SCEN[0]).masseMere;}, 300000],
    ['Frais funéraires : 8 000 € déduits à hauteur du forfait de 1 500 €',
      ()=>{S=defaults(); S.maisonValeur=1000000; S.assets.find(a=>a.id==='obseq').montant=8000;
           return computeScenario(SCEN[0]).massePere;}, 498500],
    ['Rappel art. 784 : donation de 150 000 € consomme aussi les tranches basses',
      ()=>{S=defaults(); const sans=calcInheritanceTax(200000,100000,0).droits;
           const avec=calcInheritanceTax(200000,100000,150000).droits; return avec>sans;}, true],
    ['AV après 70 : le conjoint exonéré ne consomme pas l\'abattement de 30 500 €',
      ()=>{S=defaults(); S.av.pereApres70.primes=130500;
           S.av.pereApres70.split={mere:50,f1:50,f2:0,f3:0,fille:0};
           return avPere().f1.reintegreSuccession;}, 34750],
    ['Trois options exposées, plus de renonciation', ()=>SCEN.length, 3],
    ['Créance de quasi-usufruit calculée mais non déduite de la masse de la mère',
      ()=>{S=defaults(); S.maisonValeur=1000000;
           S.assets.find(a=>a.id==='cb_pere').montant=200000;
           const x=computeScenario(SCEN[0]);
           return [x.creanceQuasiUsufruit, x.masseMere];}, [200000,500000]],
    ['PEA : prélèvements sociaux sur les gains passent au passif',
      ()=>{S=defaults(); S.maisonValeur=1000000;
           const a=S.assets.find(x=>x.id==='pea'); a.montant=100000; a.gains=50000; a.prop='pere';
           return computeScenario(SCEN[0]).massePere;}, 591400]
  ];
  for(const [nom, fn, attendu] of T){
    let got, ok=false;
    try{ got = fn();
         ok = Array.isArray(attendu) ? attendu.every((v,i)=>near(got[i],v,0.01))
            : (typeof attendu==='boolean') ? got===attendu
            : near(got, attendu, Math.max(0.01, Math.abs(attendu)*1e-9)); }
    catch(err){ got = 'erreur : '+err.message; }
    out.push({nom, attendu, got, ok});
  }
  S = JSON.parse(saved);
  S.bareme = S.bareme.map(b=>[b[0]===null?Infinity:b[0], b[1]]);

  const pass = out.filter(o=>o.ok).length;
  if(DEBUG){
    console.log('%cTests simulateur succession : '+pass+'/'+out.length+' réussis',
      'font-weight:bold;color:'+(pass===out.length?'#3F6E4E':'#A33A2E'));
    console.table(out.map(o=>({Test:o.nom, Attendu:o.attendu, Obtenu:typeof o.got==='number'?Math.round(o.got*100)/100:o.got, OK:o.ok})));
  }
  return out;
}
function paintTests(){
  const host = document.getElementById('tests'); if(!host) return;
  const out = runTests(), pass = out.filter(o=>o.ok).length;
  host.innerHTML = `<p><span class="badge ${pass===out.length?'b-v':'b-r'}">${pass} / ${out.length} réussis</span></p>
    <div class="tw"><table><thead><tr><th>Test</th><th class="n">Attendu</th><th class="n">Obtenu</th><th></th></tr></thead>
    <tbody>${out.map(o=>`<tr><td>${esc(o.nom)}</td>
      <td class="n">${typeof o.attendu==='number'?NF2.format(o.attendu):esc(o.attendu)}</td>
      <td class="n">${typeof o.got==='number'?NF2.format(Math.round(o.got*100)/100):esc(o.got)}</td>
      <td>${o.ok?'<span class="badge b-v">OK</span>':'<span class="badge b-r">échec</span>'}</td></tr>`).join('')}</tbody></table></div>`;
}

/* ============================================================================
   20. INITIALISATION
   ========================================================================== */
charger();          // vide au premier lancement : tout est à zéro
buildTabs();
updateUI();
runTests();
window.addEventListener('resize', ()=>{ $('#pop').hidden = true; });
</script>
